  <body class="light">
    <div class="container">
      <h1 class="quiz-presell-headline">Responda e descubra como melhorar seu desempenho com creatina</h1>
      <h2 class="quiz-presell-subheadline">Leva menos de 30 segundos e pode te ajudar a ter mais resultado nos treinos</h2>
      <div id="progress" class="progress"></div>
      <div id="question" class="question"></div>
      <div class="buttons">
        <button class="btn-nao" onclick="nextQuestion()">
          Não
        </button>
        <button class="btn-sim" onclick="nextQuestion()">
          Sim
        </button>
      </div>
    </div>

    <script>
      const questions = ["Qual é o seu principal objetivo no treino?","Você já utiliza suplementos?","Qual sua maior dificuldade hoje?","Qual sua maior dificuldade hoje?"];

      let currentQuestionIndex = 0;
      const questionElement = document.getElementById('question');
      const progressElement = document.getElementById('progress');
      const containerElement = document.querySelector('.container');

      function updateProgress() {
        progressElement.textContent = `Responda ${
          currentQuestionIndex + 1
        }/${questions.length}..`;
      }

      function showQuestion() {
        questionElement.textContent = questions[currentQuestionIndex];
        questionElement.classList.remove('slide-out');
        questionElement.classList.add('slide-in');
        updateProgress();
      }

      function showLoading() {
        containerElement.innerHTML = `
                <div class="loading-container">
                    <div class="progress">Um momento, verificando suas respostas...</div>
                    <div class="loading-icon"></div>
                </div>
            `;
        setTimeout(showFinalMessage, 1500);
      }

      function showFinalMessage() {
        containerElement.innerHTML = `
                <div class="progress">Obrigado! Aguarde e iremos redirecionar você em breve...</div>
            `;
        setTimeout(() => {
          click();
        }, 1000);
      }

      function nextQuestion() {
        questionElement.classList.remove('slide-in');
        questionElement.classList.add('slide-out');

        setTimeout(() => {
          currentQuestionIndex++;
          if (currentQuestionIndex < questions.length) {
            showQuestion();
          } else {
            showLoading(); // Última pergunta respondida
          }
        }, 500);
      }

      showQuestion();
    </script>
